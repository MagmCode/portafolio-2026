<header class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-brand-bg/70 backdrop-blur-xl">
  <div class="mx-auto flex h-24 w-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <a href="#inicio" class="group inline-flex items-center gap-3" aria-label="Ir al inicio">
      <img src="assets/MG/Logo_MG.png" alt="" aria-hidden="true" class="h-10 w-10 rounded-xl border border-white/20 object-contain shadow-soft transition duration-300 group-hover:scale-105" />
      <span class="text-sm font-semibold tracking-[0.24em] text-brand-text sm:text-base">MARIA GUEDEZ</span>
    </a>

    <nav class="hidden lg:block" aria-label="Navegacion principal">
      <ul class="flex items-center gap-6 text-sm">
        @for (item of navItems; track item.href) {
          <li>
            <a [href]="item.href" class="text-brand-muted transition hover:text-brand-cyan">{{ item.label }}</a>
          </li>
        }
      </ul>
    </nav>

    <div class="flex items-center gap-3">
      <a
        href="assets/cv-maria-guedez.pdf"
        download="cv-maria-guedez.pdf"
        class="hidden rounded-full border border-brand-primary/60 bg-brand-primary/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.15em] text-brand-text transition hover:border-brand-cyan hover:text-brand-cyan sm:inline-flex"
      >
        Descargar CV
      </a>

      <button
        type="button"
        class="inline-flex rounded-xl border border-white/15 bg-white/5 p-2 text-brand-text transition hover:border-brand-cyan hover:text-brand-cyan lg:hidden"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-navigation"
        aria-label="Abrir menu"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
        </svg>
      </button>
    </div>
  </div>

  @if (isMenuOpen()) {
    <div id="mobile-navigation" class="border-t border-white/10 bg-brand-bg/95 px-4 py-5 lg:hidden">
      <ul class="space-y-2">
        @for (item of navItems; track item.href) {
          <li>
            <a
              [href]="item.href"
              (click)="closeMenu()"
              class="block rounded-xl border border-transparent px-3 py-2 text-sm text-brand-muted transition hover:border-brand-cyan/30 hover:bg-brand-surface/70 hover:text-brand-cyan"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
      <a
        href="assets/cv-maria-guedez.pdf"
        download="cv-maria-guedez.pdf"
        class="mt-4 inline-flex rounded-full border border-brand-primary/60 bg-brand-primary/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.15em] text-brand-text transition hover:border-brand-cyan hover:text-brand-cyan"
      >
        Descargar CV
      </a>
    </div>
  }
</header>
