<header class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-primary-800/50 backdrop-blur-xl">
  <div class="mx-auto flex h-24 w-full max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    
    <a href="#inicio" class="group inline-flex items-center gap-3" aria-label="Ir al inicio">
      <div class="flex transition duration-300 group-hover:scale-105 " >
      <img ngSrc="assets/MG/Logo_MG.webp" width="920" height="1086" priority alt="" aria-hidden="true" class="h-18 w-16"  />
      <img ngSrc="assets/MG/logo_nombre_completo.webp" width="1280" height="632" priority alt="" aria-hidden="true" class="h-14 w-24 mt-3 sm:inline hidden"  />
      <!-- <span class="text-sm font-semibold tracking-[0.24em] text-neutral-100 sm:text-base">MARIA GUEDEZ</span> -->
       </div>
    </a>

    <nav class="hidden lg:block" aria-label="Navegacion principal">
      <ul class="flex items-center gap-10 text-sm">
        @for (item of navItems; track item.href) {
          <li>
            <a [href]="item.href" class="text-shadow-100 transition hover:text-accent-primary">{{ item.label }}</a>
          </li>
        }
      </ul>
    </nav>

    <div class="flex items-center gap-3">
      <a
        href="assets/cv-maria-guedez.pdf"
        download="cv-maria-guedez.pdf"
        class="btn btn-accent uppercase text-xs tracking-[0.1em] inline-flex intems-centter px-6 gap-2 sm:inline-flex hidden"
      >
      Descargar CV
      <ng-icon name="heroArrowDownTray" class="text-lg pb-6"></ng-icon>
      </a>

      <button
        type="button"
        class="inline-flex rounded-xl p-2 mr-3 text-neutral-100 transition hover:border-accent-secondary hover:text-accent-secondary/80 lg:hidden"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="mobile-navigation"
        aria-label="Abrir menu"
      >
        <ng-icon name="heroBars3BottomRight" class="text-3xl"></ng-icon>
      </button>
    </div>
  </div>

  @if (isMenuOpen()) {
    <div id="mobile-navigation" class="border-t border-white/10 bg-primary-800/70 px-4 py-5 lg:hidden">
      <ul class="space-y-2">
        @for (item of navItems; track item.href) {
          <li>
            <a
              [href]="item.href"
              (click)="closeMenu()"
              class="block rounded-xl border border-transparent px-3 py-2 text-sm text-shadow-100 transition hover:text-accent-primary"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
      <a
        href="assets/cv-maria-guedez.pdf"
        download="cv-maria-guedez.pdf"
        class="btn btn-accent uppercase text-xs tracking-[0.1em] mt-4 inline-flex intems-centter gap-2"
      >
        <ng-icon name="heroArrowDownTray" class="text-base"></ng-icon>
        Descargar CV
      </a>
    </div>
  }
</header>
