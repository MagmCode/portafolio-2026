<section id="inicio" appScrollAnimate
  class="relative mx-auto w-full max-w-7xl px-4 pb-40 pt-40 sm:px-6 lg:px-8 grid lg:grid-cols-2 lg:items-center gap-10">
  <div class="hero-deep-bg absolute inset-0 -z-10 rounded-[3rem] blur-3xl" aria-hidden="true"></div>

  <div class="mx-auto max-w-3xl text-center lg:text-left">
    <p class="text-md font-bold uppercase tracking-[0.1em] text-shadow-100 mb-4">¡Hola! soy</p>

    <h1 class="text-5xl sm:text-6xl font-extrabold text-white leading-tight">Maria Guedez</h1>

    <p class="mt-4 text-xl text-cyan-400">Software Engineer • Web Developer</p>

    <p class="mt-6 text-neutral-200">Construyo experiencias web modernas, rápidas y accesibles.</p>

    <div class="mt-8 flex items-center gap-6 justify-center lg:justify-start flex-wrap">
      <div class="flex gap-5">
        <a href="#proyectos"
          class="btn btn-primary">Ver proyectos</a>

        <a href="#contacto" 
          class=" btn btn-secondary">Contacto</a>
      </div>
    </div>

      <div class="quick-links mt-6 flex items-center gap-1 text-sm text-neutral-300">

        <a href="https://github.com/" target="_blank" rel="noopener" aria-label="GitHub"
          class="p-2 rounded hover:bg-white/3">
          <ng-icon name="octMarkGithub" class="text-neutral-100" aria-hidden="true" size="20"></ng-icon>
        </a>

        <a href="https://www.linkedin.com/" target="_blank" rel="noopener" aria-label="LinkedIn"
          class="p-2 rounded hover:bg-white/3">
          <ng-icon name="ionLogoLinkedin" class="text-neutral-100" aria-hidden="true" size="20"></ng-icon>
        </a>

        <a href="https://wa.me/1234567890" target="_blank" rel="noopener" aria-label="WhatsApp"
          class="p-2 rounded hover:bg-white/3">
          <ng-icon name="ionLogoWhatsapp" class="text-neutral-100" aria-hidden="true" size="20"></ng-icon>
        </a>

        <button (click)="copyEmail('mariaaguedez.08@gmail.com')"
          class="group flex items-center gap-2 px-3 py-2 rounded-md bg-white/3 hover:bg-white/5 hover:bg-white/5 transition" aria-label="Copiar correo">
          <ng-icon name="octMail" class="text-neutral-100" aria-hidden="true" size="18"></ng-icon>
          <span class="ml-2 overflow-hidden max-w-0 transition-all duration-300 ease-in-out group-hover:max-w-[220px] group-focus:max-w-[220px] group-hover:opacity-100 group-focus:opacity-100 whitespace-nowrap">mariaaguedez.08@gmail.com</span>
        </button>

      </div>
    </div>

  <div class="relative flex justify-center lg:justify-end">
    <div class="absolute h-56 w-56 rounded-full "></div>

    <div class="hero-card">
      <div class="flip-card" title="Hover para ver">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <div class="logo-engraved" aria-hidden="true">
              <img ngSrc="assets/MG/Logo_MG.png" alt="MG logo" width="280" height="280" priority />
            </div>
          </div>

          <div class="flip-card-back">
            <div class="placeholder" role="img" aria-label="Placeholder de imagen de perfil">
              <div class="avatar-frame" aria-hidden="true">
                <svg width="72" height="72" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true">
                  <path
                    d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zM3 21c0-3.866 3.134-7 7-7h4c3.866 0 7 3.134 7 7v1H3v-1z"
                    fill="#94A3B8" />
                </svg>
              </div>
              <p class="placeholder-text">Tu Imagen Aquí (Al hacer Hover)</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>


<!-- 
NOTA: El siguiente bloque de código es para mostrar un toast de "¡Copiado!" cuando el usuario hace clic en el botón de copiar correo. Este código puede ser colocado en un componente global para mejorar el manejo de estados y evitar duplicación en otras partes de la aplicación. Manteniendo un codigo DRY
-->


<!-- Toast (copiado) -->
@if (showToast()) {
<div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 animate-in fade-in slide-in-from-bottom-5">
  <div
    class="max-w-sm w-full bg-primary-500/20 border border-primary-500/20 backdrop-blur-2xl rounded-xl p-4 shadow-2xl">
    <div class="flex items-center gap-3">
      <div class="flex h-8 w-8 items-center justify-center rounded-full bg-emerald-500/20 text-emerald-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
      </div>
      <div>
        <div class="text-white text-sm">¡Copiado!</div>
        <p class="text-xs text-neutral-200">Correo copiado al portapapeles</p>
      </div>
    </div>
  </div>
</div>
}
