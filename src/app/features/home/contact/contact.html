<section id="contacto" appScrollAnimate class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8 lg:py-24">
  <div
    class="grid gap-6 rounded-3xl border border-white/10 bg-neutral-800/70 p-6 shadow-soft backdrop-blur-xl md:grid-cols-2 md:p-10">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-secondary-500">Contacto</p>
      <h2 class="mt-3 text-2xl font-semibold text-neutral-100 sm:text-3xl">Hablemos sobre tu siguiente proyecto</h2>
      <p class="mt-4 text-neutral-400">Disponible para colaboraciones frontend y productos digitales de alto impacto.
      </p>
    </div>

    <div class="space-y-4 text-sm">
      <p class="text-neutral-100">Email: <a class="text-secondary-500 transition hover:text-primary-500"
          [href]="'mailto:' + contact().email">{{ contact().email }}</a></p>
      <p class="text-neutral-100">Teléfono: <a class="text-secondary-500 transition hover:text-primary-500"
          [href]="'tel:' + contact().phone">{{ contact().phone }}</a></p>
      <p class="text-neutral-100">
        WhatsApp:
        <a class="text-secondary-500 transition hover:text-primary-500" [href]="contact().whatsapp" target="_blank"
          rel="noreferrer">
          {{ contact().phone }}
        </a>
      </p>
      <div class="flex gap-3 pt-2">
        <a class="rounded-full border border-white/20 px-4 py-2 text-neutral-100 transition hover:border-secondary-500 hover:text-secondary-500"
          [href]="contact().linkedin" target="_blank" rel="noreferrer">LinkedIn</a>
        <a class="rounded-full border border-white/20 px-4 py-2 text-neutral-100 transition hover:border-secondary-500 hover:text-secondary-500"
          [href]="contact().github" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </div>
  </div>
</section>
