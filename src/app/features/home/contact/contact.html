<section id="contacto" class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8 lg:py-24">
  <div class="grid gap-6 rounded-3xl border border-white/10 bg-brand-surface/70 p-6 shadow-soft backdrop-blur-xl md:grid-cols-2 md:p-10">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-cyan">Contacto</p>
      <h2 class="mt-3 text-2xl font-semibold text-brand-text sm:text-3xl">Hablemos sobre tu siguiente proyecto</h2>
      <p class="mt-4 text-brand-muted">Disponible para colaboraciones frontend y productos digitales de alto impacto.</p>
    </div>

    <div class="space-y-4 text-sm">
      <p class="text-brand-text">Email: <a class="text-brand-cyan transition hover:text-brand-primary" [href]="'mailto:' + contact().email">{{ contact().email }}</a></p>
      <p class="text-brand-text">Telefono: <a class="text-brand-cyan transition hover:text-brand-primary" [href]="'tel:' + contact().phone">{{ contact().phone }}</a></p>
      <p class="text-brand-text">
        WhatsApp:
        <a class="text-brand-cyan transition hover:text-brand-primary" [href]="contact().whatsapp" target="_blank" rel="noreferrer">
          https://wa.me/584121234567
        </a>
      </p>
      <div class="flex gap-3 pt-2">
        <a class="rounded-full border border-white/20 px-4 py-2 text-brand-text transition hover:border-brand-cyan hover:text-brand-cyan" [href]="contact().linkedin" target="_blank" rel="noreferrer">LinkedIn</a>
        <a class="rounded-full border border-white/20 px-4 py-2 text-brand-text transition hover:border-brand-cyan hover:text-brand-cyan" [href]="contact().github" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </div>
  </div>
</section>
