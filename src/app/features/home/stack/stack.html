<section id="stack" class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8 lg:py-24">
  <div class="mb-8">
    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-cyan">Mi stack</p>
    <h2 class="mt-3 text-2xl font-semibold text-brand-text sm:text-3xl">Tecnologias que uso para construir productos</h2>
  </div>

  <div class="grid gap-6 lg:grid-cols-3">
    @for (group of stackGroups(); track group.title) {
      <article class="rounded-3xl border bg-brand-surface/70 p-6 shadow-soft backdrop-blur-xl"
        [class.border-brand-primary]="group.accent === 'primary'"
        [class.border-brand-cyan]="group.accent === 'secondary'"
        [class.border-brand-pink]="group.accent === 'tertiary'">
        <h3 class="text-xl font-semibold text-brand-text">{{ group.title }}</h3>
        <p class="mt-2 text-sm text-brand-muted">{{ group.subtitle }}</p>

        <ul class="mt-5 space-y-3">
          @for (item of group.items; track item.name) {
            <li class="group/item flex items-center justify-between rounded-xl border border-white/10 bg-brand-bg/60 px-3 py-2 transition duration-300 hover:-translate-y-0.5 hover:border-brand-cyan/60">
              <div class="flex items-center gap-3">
                <span class="inline-flex h-8 min-w-8 items-center justify-center rounded-lg bg-white/10 px-1 text-xs font-semibold text-brand-text">
                  {{ item.icon }}
                </span>
                <span class="text-sm text-brand-text">{{ item.name }}</span>
              </div>
              <span class="text-xs text-brand-muted">{{ item.level }}</span>
            </li>
          }
        </ul>
      </article>
    }
  </div>
</section>
