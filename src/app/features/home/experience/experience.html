<section id="experiencia" class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8 lg:py-24">
	<div class="mb-8">
		<p class="text-sm font-semibold uppercase tracking-[0.2em] text-brand-cyan">Experiencia</p>
		<h2 class="mt-3 text-2xl font-semibold text-brand-text sm:text-3xl">Timeline profesional</h2>
	</div>

	<div class="space-y-5 border-l border-brand-cyan/40 pl-5 sm:pl-8">
		@for (item of experience(); track item.role) {
			<article class="relative rounded-2xl border border-white/10 bg-brand-surface/70 p-5 shadow-soft backdrop-blur-xl transition duration-300 hover:-translate-y-1">
				<span class="absolute -left-[2.1rem] top-6 h-3 w-3 rounded-full border border-brand-cyan bg-brand-bg sm:-left-[2.55rem]"></span>
				<p class="text-xs uppercase tracking-[0.16em] text-brand-cyan">{{ item.period }}</p>
				<h3 class="mt-1 text-xl font-semibold text-brand-text">{{ item.role }}</h3>
				<p class="text-sm text-brand-muted">{{ item.organization }}</p>
				<p class="mt-3 text-sm text-brand-muted">{{ item.summary }}</p>
				<ul class="mt-4 space-y-2 text-sm text-brand-text">
					@for (point of item.highlights; track point) {
						<li class="flex items-start gap-2">
							<span class="mt-1 h-1.5 w-1.5 rounded-full bg-brand-pink"></span>
							<span>{{ point }}</span>
						</li>
					}
				</ul>
			</article>
		}
	</div>
</section>
