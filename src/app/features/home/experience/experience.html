<section id="experiencia" appScrollAnimate class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8 lg:py-24">
	<div class="mb-8">
		<p class="text-sm font-semibold uppercase tracking-[0.2em] text-secondary-500">Experiencia</p>
		<h2 class="mt-3 text-2xl font-semibold text-neutral-100 sm:text-3xl">Timeline profesional</h2>
	</div>

	<div class="space-y-5 border-l border-secondary-500/40 pl-5 sm:pl-8">
		@for (item of experience(); track item.role) {
		<article appScrollAnimate
			class="relative rounded-2xl border border-white/10 bg-neutral-800/70 p-5 shadow-soft backdrop-blur-xl transition duration-300 hover:-translate-y-1">
			<span
				class="absolute -left-[2.1rem] top-6 h-3 w-3 rounded-full border border-secondary-500 bg-neutral-900 sm:-left-[2.55rem]"></span>
			<p class="text-xs uppercase tracking-[0.16em] text-secondary-500">{{ item.period }}</p>
			<h3 class="mt-1 text-xl font-semibold text-neutral-100">{{ item.role }}</h3>
			<p class="text-sm text-neutral-400">{{ item.organization }}</p>
			<p class="mt-3 text-sm text-neutral-400">{{ item.summary }}</p>
			<ul class="mt-4 space-y-2 text-sm text-neutral-100">
				@for (point of item.highlights; track point) {
				<li class="flex items-start gap-2">
					<span class="mt-1 h-1.5 w-1.5 rounded-full bg-warn-500"></span>
					<span>{{ point }}</span>
				</li>
				}
			</ul>
		</article>
		}
	</div>
</section>
